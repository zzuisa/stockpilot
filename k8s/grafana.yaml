# Grafana — 对应说明书 §15 grafana 服务(内存上限 300Mi)
# 经宿主 nginx 以子路径 https://roguelife.de/stockpilot/grafana/ 反代
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: stockpilot
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana-oss:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stockpilot-secrets
              key: GRAFANA_PASSWORD
        - name: DB_PASSWORD                  # 供 datasource provisioning 的 $__env{DB_PASSWORD}
          valueFrom:
            secretKeyRef:
              name: stockpilot-secrets
              key: DB_PASSWORD
        - name: GF_SERVER_ROOT_URL
          value: "https://roguelife.de/stockpilot/grafana/"
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: provisioning-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: provisioning-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards-json
          mountPath: /var/lib/grafana/dashboards
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "192Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: grafana-data
        persistentVolumeClaim:
          claimName: stockpilot-grafana-pvc
      - name: provisioning-datasources
        configMap:
          name: grafana-provisioning-datasources
      - name: provisioning-dashboards
        configMap:
          name: grafana-provisioning-dashboards
      - name: dashboards-json
        configMap:
          name: grafana-dashboards-json

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: stockpilot
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30811
